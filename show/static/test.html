<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DMX Channel Tester</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body { margin: 0; padding: 16px; background: #0c0c0e; color: #eee;
         font-family: -apple-system, system-ui, sans-serif; }
  h1 { font-size: 1rem; margin: 0 0 4px; }
  p  { margin: 0 0 16px; opacity: .6; font-size: .85rem; }
  .ch { display: grid; grid-template-columns: 56px 1fr 48px; align-items: center;
        gap: 12px; margin: 6px 0; }
  .ch label { font-variant-numeric: tabular-nums; opacity: .8; }
  .ch output { text-align: right; font-variant-numeric: tabular-nums; opacity: .9; }
  input[type=range] { width: 100%; height: 36px; }
  .row { display: flex; gap: 8px; margin: 16px 0; flex-wrap: wrap; }
  button { padding: 12px 18px; border: 0; border-radius: 8px; background: #2a2a2a;
           color: #fff; font-size: .95rem; }
  button.warn { background: #5a1010; }
  a { color: #8ab4ff; }
</style>
</head>
<body>
<h1>🔬 DMX Channel Tester</h1>
<p>CH1 starts at 255 (master open). Move one slider at a time and watch the light.<br>
   When you're done, go <a href="/">back to the show</a>.</p>

<div class="row">
  <button id="zero">All → 0</button>
  <button id="full">All → 255</button>
  <button class="warn" id="exit">Exit test mode</button>
</div>

<div id="channels"></div>

<script>
const N = 16;  // first 16 channels
const wrap = document.getElementById("channels");
const vals = {};

function send() {
  const channels = {};
  for (const [k, v] of Object.entries(vals)) if (v > 0) channels[k] = v;
  fetch("/api/raw", { method: "POST", headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ channels }) });
}
let timer = null;
const sendDebounced = () => { clearTimeout(timer); timer = setTimeout(send, 50); };

const sliders = [];
for (let i = 1; i <= N; i++) {
  const start = (i === 1) ? 255 : 0;  // CH1 = master, open it so colours are visible
  vals[i] = start;
  const row = document.createElement("div"); row.className = "ch";
  const lab = document.createElement("label"); lab.textContent = "CH" + i;
  const inp = document.createElement("input"); inp.type = "range"; inp.min = 0; inp.max = 255; inp.value = start;
  const out = document.createElement("output"); out.textContent = "" + start;
  inp.addEventListener("input", () => { vals[i] = +inp.value; out.textContent = inp.value; sendDebounced(); });
  row.append(lab, inp, out); wrap.append(row);
  sliders.push({inp, out, i});
}

document.getElementById("zero").onclick = () => {
  sliders.forEach(s => { s.inp.value = 0; s.out.textContent = "0"; vals[s.i] = 0; }); send();
};
document.getElementById("full").onclick = () => {
  sliders.forEach(s => { s.inp.value = 255; s.out.textContent = "255"; vals[s.i] = 255; }); send();
};
document.getElementById("exit").onclick = () => {
  fetch("/api/raw", { method: "POST", headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ channels: null }) });
};

// Enter test mode: blackout everything
send();
</script>
</body>
</html>
