<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Setlist</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
  html, body { height: 100%; }
  body {
    margin: 0; background: #0c0c0e; color: #eee; user-select: none;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    display: flex; flex-direction: column;
  }

  /* Top nav: tabs to swap between Show and Setlist */
  nav {
    flex: none; display: flex; align-items: center; gap: 8px;
    padding: max(12px, env(safe-area-inset-top)) 14px 10px;
    background: #16161a; border-bottom: 1px solid #222;
  }
  nav a {
    padding: 10px 22px; border-radius: 999px; text-decoration: none; color: #888;
    font-weight: 700; font-size: .95rem;
  }
  nav a.active { background: #2c2c30; color: #fff; }
  nav .spacer { flex: 1; }
  nav .name { font-size: .8rem; opacity: .5; font-weight: 600; margin-right: 8px; }
  #edit-toggle {
    padding: 10px 18px; border: 1px solid #333; border-radius: 999px; background: transparent;
    color: #aaa; font-weight: 700; font-size: .85rem;
  }
  #edit-toggle.on { background: #5a3010; color: #fff; border-color: #835020; }

  /* Song list */
  .scroll { flex: 1; overflow-y: auto; padding: 14px 14px max(20px, env(safe-area-inset-bottom)); }
  .between {
    display: block; width: 100%; padding: 16px; margin-bottom: 16px; border: 1px dashed #444;
    border-radius: 14px; background: transparent; color: #aaa; font-size: 1.05rem; font-weight: 600;
    text-align: center;
  }
  .between.active { background: #2c2c30; color: #fff; border-style: solid; }
  .section { font-size: .8rem; opacity: .45; text-transform: uppercase; letter-spacing: .12em;
             font-weight: 700; margin: 22px 0 10px; padding-left: 4px; }
  .section:first-of-type { margin-top: 0; }

  button.song {
    display: flex; align-items: center; gap: 14px; width: 100%;
    padding: 16px 18px; margin-bottom: 8px; border: 0; border-radius: 14px;
    background: #1d1d22; color: #ddd; text-align: left;
    transition: transform .04s, background .08s;
  }
  button.song:active { transform: scale(.985); filter: brightness(1.4); }
  button.song.playing { background: #2c4a2c; color: #fff; outline: 2.5px solid #6c6; }
  button.song .num { width: 30px; flex: none; font-size: 1.1rem; opacity: .35;
                     font-variant-numeric: tabular-nums; font-weight: 700; }
  button.song .info { flex: 1; min-width: 0; }
  button.song .title { font-size: 1.35rem; font-weight: 700; line-height: 1.2; }
  button.song .meta { font-size: .82rem; opacity: .55; margin-top: 3px; display: flex; gap: 14px; }
  button.song .swatch { width: 12px; height: 12px; border-radius: 3px; flex: none;
                        align-self: center; margin-right: -4px; }
  button.song .scene-tag { font-size: .85rem; opacity: .8; flex: none; padding: 6px 12px;
                           border-radius: 8px; background: #2a2a30; }

  /* Inline editor row */
  .editor {
    display: grid; grid-template-columns: 1fr 100px 100px auto; gap: 10px;
    padding: 12px 16px; margin: -2px 0 8px; border-radius: 0 0 14px 14px;
    background: #14141a; border: 1px solid #333; border-top: 0;
  }
  .editor select, .editor input {
    background: #222; border: 1px solid #444; border-radius: 8px; color: #eee;
    padding: 10px 12px; font-size: .95rem; min-width: 0;
  }
  .editor button { padding: 10px 18px; border: 0; border-radius: 8px; background: #4a8a4a;
                   color: #fff; font-weight: 700; }
  .editor label { display: flex; flex-direction: column; gap: 4px; font-size: .7rem;
                  opacity: .6; text-transform: uppercase; letter-spacing: .06em; }
  .conn { font-size: .75rem; opacity: .35; text-align: center; padding: 8px; flex: none; }
</style>
</head>
<body>

<nav>
  <a href="/">🎛 Show</a>
  <a href="/setlist" class="active">📋 Setlist</a>
  <span class="spacer"></span>
  <span class="name" id="setlist-name"></span>
  <button id="edit-toggle">✏️ Edit</button>
</nav>

<div class="scroll">
  <button class="between" id="between">⏸ Between songs</button>
  <div id="songs"></div>
</div>
<div class="conn" id="conn">connecting…</div>

<script>
const conn = document.getElementById("conn");
const songsEl = document.getElementById("songs");
const editToggle = document.getElementById("edit-toggle");
const betweenBtn = document.getElementById("between");

let DATA = { songs: [], scenes: [], current: -1, between: {} };
let editMode = false;
let openEditor = -1;

function post(url, body) {
  return fetch(url, { method: "POST", headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body) })
    .then(r => { conn.textContent = "● connected"; return r.json(); })
    .catch(() => { conn.textContent = "✕ connection lost"; return null; });
}

function sceneLabel(name) {
  const s = DATA.scenes.find(s => s.name === name);
  return s ? s.label : name || "—";
}
function hueColour(deg) {
  return deg ? `hsl(${deg}, 80%, 55%)` : "#444";
}

function render() {
  document.getElementById("setlist-name").textContent = DATA.name || "";
  betweenBtn.classList.toggle("active", DATA.current === -1);
  songsEl.replaceChildren();

  let lastSection = null;
  DATA.songs.forEach((song, i) => {
    if (song.section && song.section !== lastSection) {
      lastSection = song.section;
      const h = document.createElement("div");
      h.className = "section"; h.textContent = song.section;
      songsEl.appendChild(h);
    }

    const b = document.createElement("button");
    b.className = "song" + (i === DATA.current ? " playing" : "");

    const num = document.createElement("span"); num.className = "num"; num.textContent = i + 1;
    const info = document.createElement("div"); info.className = "info";
    const title = document.createElement("div"); title.className = "title"; title.textContent = song.title;
    const meta = document.createElement("div"); meta.className = "meta";
    if (song.artist) meta.append(Object.assign(document.createElement("span"), { textContent: song.artist }));
    if (song.bpm) meta.append(Object.assign(document.createElement("span"), { textContent: song.bpm + " bpm" }));
    info.append(title, meta);

    const swatch = document.createElement("span"); swatch.className = "swatch";
    swatch.style.background = hueColour(song.hue);
    const tag = document.createElement("span"); tag.className = "scene-tag";
    tag.textContent = sceneLabel(song.scene);

    b.append(num, info, swatch, tag);
    b.addEventListener("click", () => editMode ? toggleEditor(i) : playSong(i));
    songsEl.appendChild(b);

    if (editMode && openEditor === i) songsEl.appendChild(buildEditor(i, song));
  });
}

function buildEditor(i, song) {
  const ed = document.createElement("div"); ed.className = "editor";

  const sceneL = document.createElement("label"); sceneL.textContent = "Scene";
  const sceneSel = document.createElement("select");
  for (const s of DATA.scenes) {
    const o = document.createElement("option"); o.value = s.name; o.textContent = `${s.label} (${s.mood})`;
    if (s.name === song.scene) o.selected = true;
    sceneSel.appendChild(o);
  }
  sceneL.appendChild(sceneSel);

  const hueL = document.createElement("label"); hueL.textContent = "Hue °";
  const hueIn = document.createElement("input"); hueIn.type = "number"; hueIn.min = 0; hueIn.max = 359;
  hueIn.value = song.hue || 0; hueL.appendChild(hueIn);

  const bpmL = document.createElement("label"); bpmL.textContent = "BPM";
  const bpmIn = document.createElement("input"); bpmIn.type = "number"; bpmIn.min = 60; bpmIn.max = 200;
  bpmIn.value = song.bpm || ""; bpmL.appendChild(bpmIn);

  const save = document.createElement("button"); save.textContent = "Save";
  save.addEventListener("click", async () => {
    const fields = { scene: sceneSel.value, hue: +hueIn.value || 0, bpm: +bpmIn.value || null };
    const r = await post("/api/setlist/edit", { index: i, fields });
    if (r) { DATA.songs = r.songs; DATA.current = r.current; openEditor = -1; render(); }
  });

  ed.append(sceneL, hueL, bpmL, save);
  return ed;
}

function toggleEditor(i) { openEditor = openEditor === i ? -1 : i; render(); }

async function playSong(i) {
  DATA.current = i; render();
  await post("/api/setlist/play", { index: i });
}

betweenBtn.addEventListener("click", async () => {
  if (editMode) return;
  DATA.current = -1; render();
  await post("/api/setlist/between", {});
});

editToggle.addEventListener("click", () => {
  editMode = !editMode; openEditor = -1;
  editToggle.classList.toggle("on", editMode);
  editToggle.textContent = editMode ? "✓ Done" : "✏️ Edit";
  render();
});

// Initial load + light poll so a 2nd device sees the now-playing
function refresh() {
  return fetch("/api/setlist").then(r => r.json()).then(d => {
    if (!d) return;
    if (!editMode) { DATA = d; render(); }
    conn.textContent = "● connected";
  }).catch(() => conn.textContent = "✕ connection lost");
}
refresh();
setInterval(refresh, 4000);
</script>
</body>
</html>
